# ─── DataSource (PostgreSQL — prod) ───────────────────────────────────────────
# Set these via environment variables or a secrets manager; never hardcode credentials.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/orderdb}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:orderuser}
spring.datasource.password=${DB_PASSWORD:changeme}

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Use 'validate' in prod so Hibernate never modifies the schema automatically.
# Run schema migrations with Flyway or Liquibase instead.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
